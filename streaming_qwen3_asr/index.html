<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Qwen3-ASR Streaming</title>
    <style>
      body {
        user-select: none;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        max-width: 980px;
        margin: 0 auto;
        padding: 18px;
        background: #fafafa;
      }
      h1 { margin: 0 0 10px 0; font-size: 20px; }
      .hint {
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff7e6;
        border: 1px solid #ffd591;
        color: #874d00;
        font-size: 13px;
        margin: 10px 0 14px 0;
        line-height: 1.4;
      }
      #recordButton {
        border-radius: 12px;
        border: 1px solid #ddd;
        background-color: #fff;
        padding: 10px 16px;
        font-size: 15px;
        cursor: pointer;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(0,0,0,.04);
      }
      #recordButton.recording {
        background-color: #ff4d4f;
        color: #fff;
        border-color: #ff4d4f;
      }

      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid #eee;
        font-size: 13px;
        color: #444;
      }
      .dot { width: 10px; height: 10px; border-radius: 999px; background: #bbb; display: inline-block; }
      .dot.active { background: #52c41a; }

      #cards { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
      .card {
        background: #fff;
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 12px 14px;
        box-shadow: 0 1px 2px rgba(0,0,0,.04);
      }
      .cardHeader { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
      .badge { font-size: 12px; padding: 4px 8px; border-radius: 999px; border: 1px solid #eee; background: #fafafa; color: #555; }
      .badge.live { background: #e6fffb; border-color: #87e8de; color: #006d75; }
      .time { font-size: 12px; color: #888; font-variant-numeric: tabular-nums; white-space: nowrap; }
      .text { font-size: 16px; line-height: 1.55; white-space: pre-wrap; user-select: auto; }
      .sub { margin-top: 8px; font-size: 12px; color: #9a9a9a; }

      .footer { margin-top: 14px; font-size: 12px; color: #777; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .btnRow { display: flex; gap: 8px; align-items: center; }
      .smallBtn {
        border-radius: 10px;
        border: 1px solid #ddd;
        background: #fff;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .smallBtn:active { transform: translateY(1px); }

      #MicBox {
        position: fixed;
        width: 56px;
        height: 56px;
        border-radius: 999px;
        box-shadow: 0 2px 10px rgba(0,0,0,.08);
        display: flex;
        align-items: center;
        justify-content: center;
        top: 16px;
        right: 16px;
        background-color: white;
        border: 1px solid #eee;
      }
      @media screen and (max-width: 600px) {
        #MicBox { top: unset; bottom: 10px; right: calc(50% - 28px); }
      }
      #MicWait { display: block; }
      #MicListen { display: none; }
    </style>
  </head>

  <body>
    <h1>Qwen3-ASR 流式语音识别</h1>

    <div class="hint">
      提示：此页面仅用于测试代码，不保证稳定性和识别效果。
    </div>

    <div class="row">
      <button id="recordButton">开始识别</button>
      <button id="stopButton" style="display:none;">停止识别</button>

      <div class="pill">
        <span id="micDot" class="dot"></span>
        <span>Mic：</span>
        <span id="micText" class="mono" style="color:#aaa">idle</span>
      </div>

      <div class="pill">
        <span>WS：</span>
        <span id="wsText" class="mono" style="color:#aaa">closed</span>
      </div>

      <div class="btnRow">
        <button class="smallBtn" id="btnClear">清空结果</button>
      </div>
    </div>

    <div id="cards"></div>

    <div id="MicBox" title="麦克风状态">
      <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="30" height="30" id="MicWait">
        <path d="M393.846154 301.948718m-301.948718 0a301.948718 301.948718 0 1 0 603.897436 0 301.948718 301.948718 0 1 0-603.897436 0Z" fill="#8CF6FB"></path>
        <path d="M932.102564 420.102564c0 216.615385-165.415385 397.784615-380.717949 418.789744l-65.641025 1.31282C263.876923 825.764103 91.897436 641.969231 91.897436 420.102564v-13.128205-6.564103C91.897436 382.030769 106.338462 367.589744 124.717949 367.589744S157.538462 382.030769 157.538462 400.410256V420.102564c0 195.610256 158.851282 354.461538 354.461538 354.461539s354.461538-158.851282 354.461538-354.461539v-13.128205-6.564103c0-18.379487 14.441026-32.820513 32.820513-32.820512s32.820513 14.441026 32.820513 32.820512V420.102564zM512 708.923077c-160.164103 0-288.820513-128.65641-288.820513-288.820513V288.820513C223.179487 128.65641 351.835897 0 512 0s288.820513 128.65641 288.820513 288.820513v131.282051c0 160.164103-128.65641 288.820513-288.820513 288.820513z m223.179487-420.102564c0-123.405128-99.774359-223.179487-223.179487-223.179487s-223.179487 99.774359-223.179487 223.179487v131.282051c0 123.405128 99.774359 223.179487 223.179487 223.179487s223.179487-99.774359 223.179487-223.179487V288.820513z" fill="#3C2DCB"></path>
      </svg>
      <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="30" height="30" id="MicListen">
        <path d="M393.846154 301.948718m-301.948718 0a301.948718 301.948718 0 1 0 603.897436 0 301.948718 301.948718 0 1 0-603.897436 0Z" fill="#f9ba1c"></path>
        <path d="M932.102564 420.102564c0 216.615385-165.415385 397.784615-380.717949 418.789744l-65.641025 1.31282C263.876923 825.764103 91.897436 641.969231 91.897436 420.102564v-13.128205-6.564103C91.897436 382.030769 106.338462 367.589744 124.717949 367.589744S157.538462 382.030769 157.538462 400.410256V420.102564c0 195.610256 158.851282 354.461538 354.461538 354.461539s354.461538-158.851282 354.461538-354.461539v-13.128205-6.564103c0-18.379487 14.441026-32.820513 32.820513-32.820512s32.820513 14.441026 32.820513 32.820512V420.102564zM512 708.923077c-160.164103 0-288.820513-128.65641-288.820513-288.820513V288.820513C223.179487 128.65641 351.835897 0 512 0s288.820513 128.65641 288.820513 288.820513v131.282051c0 160.164103-128.65641 288.820513-288.820513 288.820513z m223.179487-420.102564c0-123.405128-99.774359-223.179487-223.179487-223.179487s-223.179487 99.774359-223.179487 223.179487v131.282051c0 123.405128 99.774359 223.179487 223.179487 223.179487s223.179487-99.774359 223.179487-223.179487V288.820513z" fill="#f95945"></path>
      </svg>
    </div>

    <div class="footer">
      <div class="mono" style="color:#999">
        音频：浏览器 getUserMedia → float32 → PCM16LE（16kHz/mono）→ WebSocket
      </div>
    </div>
  </body>

  <script>
    const recordButton = document.getElementById("recordButton");
    const stopButton = document.getElementById("stopButton");
    const cardsEl = document.getElementById("cards");
    const micDot = document.getElementById("micDot");
    const micText = document.getElementById("micText");
    const wsText = document.getElementById("wsText");
    const btnClear = document.getElementById("btnClear");

    let ws = null;
    let isRecording = false;

    let audioCtx = null;
    let mediaStream = null;
    let sourceNode = null;
    let processorNode = null;

    const TARGET_SR = 16000;
    const SEND_MS = 100;
    const SAMPLES_PER_PACKET = TARGET_SR * SEND_MS / 1000;

    let resampleBuf = [];

    const ui = {
      setWS(state) {
        wsText.textContent = state;
        wsText.style.color = (state === "open") ? "#006d75" : "#aaa";
      },
      setMic(active) {
        micDot.classList.toggle("active", !!active);
        micText.textContent = active ? "active" : "idle";
        micText.style.color = active ? "#006d75" : "#aaa";
        document.getElementById("MicWait").style.display = active ? "none" : "block";
        document.getElementById("MicListen").style.display = active ? "block" : "none";
      },
      setVAD(active) {
        micDot.classList.toggle("active", !!active);
        micText.textContent = active ? "speech" : "listening";
        micText.style.color = active ? "#006d75" : "#aaa";
      },
    };

    ui.setWS("closed");
    ui.setMic(false);

    const state = {
      sentences: new Map(), // id -> {id, text, is_final}
      activeId: null
    };

    function ensureSentence(id) {
      if (!state.sentences.has(id)) {
        state.sentences.set(id, { id, text: "", is_final: false });
      }
      return state.sentences.get(id);
    }

    function render() {
      const items = Array.from(state.sentences.values()).sort((a, b) => a.id - b.id);
      cardsEl.innerHTML = "";

      for (const s of items) {
        const card = document.createElement("div");
        card.className = "card";

        const header = document.createElement("div");
        header.className = "cardHeader";

        const badge = document.createElement("div");
        badge.className = "badge" + (s.is_final ? "" : " live");
        badge.textContent = s.is_final ? `#${s.id} FINAL` : `#${s.id} LIVE`;

        const time = document.createElement("div");
        time.className = "time mono";
        time.textContent = s.is_final ? "已完成" : "实时更新中";

        header.appendChild(badge);
        header.appendChild(time);

        const text = document.createElement("div");
        text.className = "text";
        text.textContent = s.text || "";

        card.appendChild(header);
        card.appendChild(text);
        cardsEl.appendChild(card);
      }
    }

    function resetAll() {
      state.sentences.clear();
      state.activeId = null;
      render();
    }

    btnClear.onclick = () => resetAll();

    recordButton.onclick = () => {
      if (!isRecording) start();
      else stop();
    };

    stopButton.onclick = () => {
      stop();
    };

    function wsSend(u8) {
      if (!u8 || u8.length === 0) return;
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(u8.buffer.slice(u8.byteOffset, u8.byteOffset + u8.byteLength));
    }

    function floatToPCM16(float32) {
      const out = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        let s = Math.max(-1, Math.min(1, float32[i]));
        out[i] = (s < 0 ? s * 32768 : s * 32767) | 0;
      }
      return new Uint8Array(out.buffer);
    }

    function downsampleTo16k(input, inSampleRate) {
      if (inSampleRate === TARGET_SR) return input;

      const ratio = inSampleRate / TARGET_SR;
      const newLen = Math.floor(input.length / ratio);
      const out = new Float32Array(newLen);

      for (let i = 0; i < newLen; i++) {
        const start = Math.floor(i * ratio);
        const end = Math.floor((i + 1) * ratio);
        let sum = 0;
        let count = 0;

        for (let j = start; j < end && j < input.length; j++) {
          sum += input[j];
          count++;
        }

        out[i] = count ? (sum / count) : (input[start] || 0);
      }

      return out;
    }

    async function start() {
      resetAll();

      const wsProto = window.location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${wsProto}//${window.location.host}/api/realtime/ws`);
      ws.binaryType = "arraybuffer";

      ws.onopen = async () => {
        ui.setWS("open");
        recordButton.style.display = "none";
        stopButton.style.display = "inline-block";
        isRecording = true;

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            }
          });
        } catch (e) {
          alert("获取麦克风失败：" + e);
          ws.close();
          return;
        }

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        sourceNode = audioCtx.createMediaStreamSource(mediaStream);
        processorNode = audioCtx.createScriptProcessor(4096, 1, 1);

        const inSR = audioCtx.sampleRate;

        processorNode.onaudioprocess = (e) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return;

          const input = e.inputBuffer.getChannelData(0);
          const ds0 = downsampleTo16k(input, inSR);

          for (let i = 0; i < ds0.length; i++) {
            resampleBuf.push(ds0[i]);
          }

          while (resampleBuf.length >= SAMPLES_PER_PACKET) {
            const frame = new Float32Array(SAMPLES_PER_PACKET);
            for (let i = 0; i < SAMPLES_PER_PACKET; i++) {
              frame[i] = resampleBuf[i];
            }
            resampleBuf = resampleBuf.slice(SAMPLES_PER_PACKET);

            const u8 = floatToPCM16(frame);
            wsSend(u8);
          }
        };

        const gain = audioCtx.createGain();
        gain.gain.value = 0;

        sourceNode.connect(processorNode);
        processorNode.connect(gain);
        gain.connect(audioCtx.destination);

        ui.setMic(true);
      };

      ws.onmessage = (evt) => {
        let j = null;
        try {
          j = JSON.parse(evt.data);
        } catch (e) {
          console.error("WS JSON parse error:", e, evt.data);
          return;
        }

        try {
          if (j.type === "InitResponse") {
            console.log("InitResponse:", j);
            return;
          }

          if (j.type === "VADEvent") {
            if (ui.setVAD) {
              ui.setVAD(!!j.is_active);
            }
            return;
          }

          if (j.type === "NewSegment") {
            const id = Number(j.segment_id || 1);
            state.activeId = id;
            ensureSentence(id);
            render();
            return;
          }

          if (j.type === "TranscriptionResponse") {
            const id = Number(j.segment_id || state.activeId || 1);
            const isFinal = !!j.is_final;
            const text = j.text || "";

            const s = ensureSentence(id);

            if (!isFinal) {
              state.activeId = id;
              s.is_final = false;
              if (text) s.text = text;
              render();
              return;
            }

            s.is_final = true;
            s.text = text || s.text;
            render();

            if (state.activeId === id) {
              state.activeId = null;
            }
            return;
          }

          console.log("Unknown WS message:", j);
        } catch (e) {
          console.error("WS message handle error:", e, j);
        }
      };

      ws.onclose = () => {
        ui.setWS("closed");
        ui.setMic(false);
        cleanupAudio();
        recordButton.style.display = "inline-block";
        stopButton.style.display = "none";
        isRecording = false;
      };

      ws.onerror = (e) => {
        console.error("WebSocket error:", e);
        try {
          ws && ws.close();
        } catch (err) {}
      };
    }

    function cleanupAudio() {
      try { if (processorNode) processorNode.disconnect(); } catch (e) {}
      try { if (sourceNode) sourceNode.disconnect(); } catch (e) {}
      try { if (audioCtx) audioCtx.close(); } catch (e) {}

      audioCtx = null;
      processorNode = null;
      sourceNode = null;

      if (mediaStream) {
        try {
          mediaStream.getTracks().forEach(t => t.stop());
        } catch (e) {}
      }

      mediaStream = null;
      resampleBuf = [];
    }

    function stop() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: "EOS" }));
      }
    }
  </script>
</html>
